version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    cooldown:
      default-days: 7
      exclude:
        - "databricks*"
    schedule:
      interval: "daily"

  - package-ecosystem: "npm"
    directory: "/docs/impulse"
    cooldown:
      default-days: 7
    schedule:
      interval: "daily"

  # Disabled for now, pending guidance on how GHA-updates need to be handled.
