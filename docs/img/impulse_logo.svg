<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1B3A4B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D5F7A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Impulse signal mark (solid Databricks red) -->
  <g transform="translate(20, 20)">
    <path d="M 0,40 L 15,40 L 20,40 L 25,8 L 30,40 L 35,52 L 42,40 L 55,40"
          fill="none" stroke="#FF3621" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 55,40 L 62,40 L 66,22 L 70,40 L 73,46 L 77,40 L 85,40"
          fill="none" stroke="#FF3621" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  </g>

  <!-- Wordmark -->
  <text x="125" y="68" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="62" font-weight="700" fill="url(#textGrad)" letter-spacing="-1.5">
    Impulse
  </text>

  <!-- Tagline -->
  <text x="127" y="92" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="400" fill="#5A7A8A" letter-spacing="3">
