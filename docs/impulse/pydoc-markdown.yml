loaders:
  - type: python
    search_path: [../../src]
    modules:
      - mda_reporting.core.report
      - mda_reporting.core.page
      - mda_reporting.events.basic_event
      - mda_reporting.events.container_event
      - mda_reporting.events.sequence_of_events
      - mda_reporting.aggregations.histogram
      - mda_reporting.aggregations.histogram2d
      - mda_reporting.aggregations.stats_aggregator
      - mda_reporting.config.config_parser
      - mda_query_engine.analyze.query.query_builder
      - mda_query_engine.analyze.metadata.time_series_expression
      - mda_query_engine.analyze.metadata.tag_expression
      - mda_query_engine.analyze.metadata.metric_expression
      - mda_query_engine.analyze.query.aggregations.statistic_type
      - mda_query_engine.analyze.query.solvers.delta_solver
      - mda_query_engine.analyze.query.solvers.basic_narrow_solver
      - mda_query_engine.analyze.query.solvers.key_value_store_solver
      - mda_query_engine.analyze.query.solvers.solver_config
      - mda_query_engine.analyze.query.solvers.query_solver
      - mda_query_engine.model.series.sample_series
      - mda_query_engine.model.series.intervals
      - mda_query_engine.model.series.points_in_time

processors:
  - type: filter
    expression: "obj.__class__.__name__ != 'Indirection' and getattr(obj, 'name', None) not in ['Histogram', 'Histogram2D', 'TagExpression', 'MetricExpression', 'TimeSeriesExpression', 'DeltaTimeSeriesCache', 'BasicNarrowTimeSeriesCache', 'RequiresDeserialization'] and default()"
    documented_only: true
    exclude_private: true
    exclude_special: true
    skip_empty_modules: true
  - type: sphinx
  - type: crossref

renderer:
  type: docusaurus
  docs_base_path: docs
  relative_output_path: references/api
  sidebar_top_level_label: API Reference
  sidebar_top_level_module_label: null
  markdown:
    escape_html_in_docstring: false
    use_fixed_header_levels: true
    descriptive_class_title: false
    classdef_with_decorators: false
    signature_with_decorators: false
    signature_python_help_style: false
    render_module_header: true
