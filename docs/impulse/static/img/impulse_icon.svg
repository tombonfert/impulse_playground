<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1B3A4B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D5F7A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="sigGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF3621;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF6A33;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="80" height="80" rx="16" ry="16" fill="url(#bgGrad)"/>

  <!-- Impulse signal -->
  <path d="M 12,42 L 22,42 L 27,42 L 33,14 L 39,42 L 44,56 L 51,42 L 58,42 L 62,28 L 66,42 L 68,42"
        fill="none" stroke="url(#sigGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Subtle baseline dots -->
  <circle cx="12" cy="42" r="1.5" fill="#FF3621" opacity="0.5"/>
  <circle cx="68" cy="42" r="1.5" fill="#FF6A33" opacity="0.5"/>
</svg>
