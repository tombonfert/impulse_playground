# Databricks Asset Bundle for the A2D2 ADAS demo (Impulse Event Explorer).
# Full pipeline + app — see README.md.
#
#   cd demos/a2d2
#   ( cd app/frontend && npm install && npm run build )      # build the React app first
#   databricks bundle deploy  -t dev -p <your-profile>
#   databricks bundle run a2d2_ingestion          -t dev -p <your-profile>  # 1) download + ingest (3 drives)
#   databricks bundle run a2d2_object_detection   -t dev -p <your-profile>  # 2) detection + depth -> channels
#   databricks bundle run a2d2_analysis           -t dev -p <your-profile>  # 3) events + stats + MP4 clips
#   databricks bundle run a2d2_event_verification -t dev -p <your-profile>  # 4) GenAI relevance verdicts
#   databricks bundle run impulse_explorer        -t dev -p <your-profile>  # 5) (re)deploy the app
#
# Detection runs on a classic ML cluster (defined below); the other jobs are serverless.
# The impulse package is built from the repo root (../..) into ./dist as a wheel and installed on the
# jobs, so `import impulse_*` works without the repo being on the workspace sys.path. Override any
# widget via a bundle variable, e.g.:
#
#   databricks bundle run a2d2_ingestion -t dev -p <profile> \
#       --var="catalog=my_catalog,schema=my_schema,download_images=false"
bundle:
  name: a2d2-demo

# The frontend build output is .gitignore'd (dist/ rule for the wheel), so force it
# into the bundle sync — the FastAPI app serves the React SPA from app/frontend/dist.
sync:
  include:
    - app/frontend/dist/**

variables:
  catalog:
    description: Unity Catalog catalog for the silver tables and download volume.
    default: main
  schema:
    description: Target schema (created if missing).
    default: a2d2_demo
  table_prefix:
    default: a2d2
  volume:
    default: a2d2_raw
  download_images:
    default: "true"
  extract_partitions:
    description: Parallel Spark tasks for the index-free camera-tar untar.
    default: "64"
  clip_max_duration_s:
    description: Max seconds of footage per event MP4 clip (analysis notebook).
    default: "10"
  clip_fps:
    description: Playback frames-per-second for event MP4 clips (analysis notebook).
    default: "5"
  clips_per_event:
    description: How many MP4 clips to export per event name (analysis notebook).
    default: "5"
  detect_model:
    description: torchvision detector (fasterrcnn_resnet50_fpn | ssdlite320_mobilenet_v3_large | fcos_resnet50_fpn).
    default: fasterrcnn_resnet50_fpn
  detect_score_threshold:
    description: Minimum detection score to count a box.
    default: "0.5"
  frames_per_second:
    description: Temporally downsample detection to this many frames/sec (0 = all frames).
    default: "1"
  ahead_center_frac:
    description: Center-ahead band width as a fraction of image width (smaller = stricter "in path").
    default: "0.34"
  detect_repartitions:
    description: Spark partitions for distributed inference (match the cluster's core count).
    default: "32"
  estimate_distance:
    description: Also estimate distance-to-object via Depth Anything V2 metric depth.
    default: "true"
  depth_model:
    description: HuggingFace metric-depth model id (Depth Anything V2 metric).
    default: depth-anything/Depth-Anything-V2-Metric-Outdoor-Small-hf
  verify_model:
    description: Multimodal serving endpoint used by the VLM-as-judge event verifier.
    default: databricks-claude-opus-4-8
  frames_per_event:
    description: Frames sent to the judge per event in the verification notebook.
    default: "3"
  verify_window_s:
    description: Max seconds from an event's start to sample verification frames from.
    default: "6"
  verify_limit:
    description: Verify at most N events (0 = all; >0 for smoke tests).
    default: "0"

artifacts:
  impulse_wheel:
    type: whl
    path: .
    build: uv build --wheel ../.. --out-dir ./dist

resources:
  # ---------------------------------------------------------------------------
  # Databricks App for the A2D2 Event Explorer.
  # The app (demos/a2d2/app) is a FastAPI + React SPA that reads the silver
  # tables and streams MP4 clips. Its app.yaml references the warehouse via the
  # resource key `sql-warehouse` (valueFrom -> DATABRICKS_WAREHOUSE_ID).
  # The app defaults to the shared dbdemos endpoint; the in-app config overlay
  # lets a presenter switch warehouses at runtime.
  # ---------------------------------------------------------------------------
  apps:
    impulse_explorer:
      name: impulse-event-explorer
      description: "Impulse Event Explorer — map + clips + channel stats + AI verdicts over the silver tables."
      source_code_path: ./app
      resources:
        - name: sql-warehouse
          sql_warehouse:
            # dbdemos-shared-endpoint — the deployed default warehouse.
            id: 862f1d757f0424f7
            permission: CAN_USE

  jobs:
    a2d2_ingestion:
      name: "[A2D2] bus + camera ingestion (3 drives)"
      # One drive per task = one container, run SEQUENTIALLY (depends_on chain) so the per-container
      # appends to the shared Delta silver tables never collide. skip_download_if_present is now
      # container-scoped (per-drive subfolders), so re-runs skip already-ingested drives.
      tasks:
        - task_key: ingest_munich
          notebook_task:
            notebook_path: ./a2d2_ingestion.ipynb
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              table_prefix: ${var.table_prefix}
              volume: ${var.volume}
              download_images: ${var.download_images}
              extract_partitions: ${var.extract_partitions}
              skip_download_if_present: "true"
              drop_created_tables: "false"
              container_id: "1"
              city: "Munich"
              recording: "20190401_121727"
              bus_url: "https://aev-autonomous-driving-dataset.s3.eu-central-1.amazonaws.com/camera_lidar-20190401121727_bus_signals.tar"
              cam_url: "https://aev-autonomous-driving-dataset.s3.eu-central-1.amazonaws.com/camera_lidar-20190401121727_camera_frontcenter.tar"
          environment_key: default
        - task_key: ingest_gaimersheim
          depends_on:
            - task_key: ingest_munich
          notebook_task:
            notebook_path: ./a2d2_ingestion.ipynb
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              table_prefix: ${var.table_prefix}
              volume: ${var.volume}
              download_images: ${var.download_images}
              extract_partitions: ${var.extract_partitions}
              skip_download_if_present: "true"
              drop_created_tables: "false"
              container_id: "2"
              city: "Gaimersheim"
              recording: "20180810_150607"
              bus_url: "https://aev-autonomous-driving-dataset.s3.eu-central-1.amazonaws.com/camera_lidar-20180810150607_bus_signals.tar"
              cam_url: "https://aev-autonomous-driving-dataset.s3.eu-central-1.amazonaws.com/camera_lidar-20180810150607_camera_frontcenter.tar"
          environment_key: default
        - task_key: ingest_ingolstadt
          depends_on:
            - task_key: ingest_gaimersheim
          notebook_task:
            notebook_path: ./a2d2_ingestion.ipynb
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              table_prefix: ${var.table_prefix}
              volume: ${var.volume}
              download_images: ${var.download_images}
              extract_partitions: ${var.extract_partitions}
              skip_download_if_present: "true"
              drop_created_tables: "false"
              container_id: "3"
              city: "Ingolstadt"
              recording: "20190401_145936"
              bus_url: "https://aev-autonomous-driving-dataset.s3.eu-central-1.amazonaws.com/camera_lidar-20190401145936_bus_signals.tar"
              cam_url: "https://aev-autonomous-driving-dataset.s3.eu-central-1.amazonaws.com/camera_lidar-20190401145936_camera_frontcenter.tar"
          environment_key: default
      environments:
        - environment_key: default
          spec:
            # Serverless environment version 5 (impulse requires serverless v4+; Python 3.12).
            environment_version: "5"
            dependencies:
              - ./dist/databricks_impulse-*.whl

    a2d2_analysis:
      name: "[A2D2] bus + camera analysis (events + MP4 clips)"
      tasks:
        - task_key: analyze
          notebook_task:
            notebook_path: ./a2d2_analysis.ipynb
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              table_prefix: ${var.table_prefix}
              volume: ${var.volume}
              clip_max_duration_s: ${var.clip_max_duration_s}
              clip_fps: ${var.clip_fps}
              clips_per_event: ${var.clips_per_event}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            environment_version: "5"
            dependencies:
              - ./dist/databricks_impulse-*.whl

    # Event verification (VLM-as-judge). Reads the event facts + camera frames, sends a few frames
    # per event to a multimodal serving endpoint with an event-specific rubric, and writes a
    # relevance verdict per event instance to {prefix}_event_verification_fact. Runs serverless:
    # inference is offloaded to the serving endpoint, so there is no local model / OOM concern.
    a2d2_event_verification:
      name: "[A2D2] event verification (VLM-as-judge)"
      tasks:
        - task_key: verify
          notebook_task:
            notebook_path: ./a2d2_event_verification.ipynb
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              table_prefix: ${var.table_prefix}
              volume: ${var.volume}
              verify_model: ${var.verify_model}
              frames_per_event: ${var.frames_per_event}
              verify_window_s: ${var.verify_window_s}
              verify_limit: ${var.verify_limit}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            environment_version: "5"
            dependencies:
              - ./dist/databricks_impulse-*.whl

    # Object detection -> silver channels. Standalone job for now; once proven it can be
    # folded into a2d2_ingestion as a `detect` task with `depends_on: [{task_key: ingest}]`.
    a2d2_object_detection:
      name: "[A2D2] object detection -> channels"
      tasks:
        - task_key: detect
          notebook_task:
            notebook_path: ./a2d2_object_detection.ipynb
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              table_prefix: ${var.table_prefix}
              volume: ${var.volume}
              detect_model: ${var.detect_model}
              detect_score_threshold: ${var.detect_score_threshold}
              frames_per_second: ${var.frames_per_second}
              ahead_center_frac: ${var.ahead_center_frac}
              detect_repartitions: ${var.detect_repartitions}
              estimate_distance: ${var.estimate_distance}
              depth_model: ${var.depth_model}
          # Classic compute (DBR 17.3 LTS), not serverless: the detector + Depth Anything V2
          # depth model loaded per partition OOM'd the serverless Python workers. Memory-
          # optimized nodes (r5d, local NVMe for spill) give the headroom. torch/torchvision/
          # transformers are installed by the notebook's %pip cell; the impulse wheel is a
          # cluster library below. SINGLE_USER access mode is required for the Python UDFs
          # (mapInPandas/applyInPandas) and FUSE volume reads.
          new_cluster:
            # ML runtime (torch + torchvision + pillow preinstalled, version-matched) on a
            # single-user classic cluster. The notebook only pip-installs transformers.
            spark_version: "17.3.x-cpu-ml-scala2.13"
            node_type_id: r5d.2xlarge
            num_workers: 4          # 4 x r5d.2xlarge (8 cores) = 32 worker cores
            data_security_mode: SINGLE_USER
            # On-demand workers (no spot) to avoid preemption mid-inference.
            aws_attributes:
              availability: ON_DEMAND
            # Persist driver/executor logs so failures are diagnosable after the cluster ends.
            cluster_log_conf:
              dbfs:
                destination: dbfs:/cluster-logs/a2d2-detect
          libraries:
            - whl: ./dist/databricks_impulse-*.whl

targets:
  dev:
    mode: development
    default: true
    # Pin the e2 (mda_demo) values so a plain `bundle deploy -t dev` can't reset the jobs to the
    # generic `main` default. The top-level variable defaults stay `main`/fasterrcnn for the public
    # demo; this dev target overrides them to what the e2 deployment actually uses. Override per-run
    # with --var if needed.
    variables:
      catalog: mda_demo
      detect_model: ssdlite320_mobilenet_v3_large
      estimate_distance: "true"
      frames_per_second: "1"
