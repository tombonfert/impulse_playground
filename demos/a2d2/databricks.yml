# Databricks Asset Bundle for the A2D2 demo (ingestion + analysis).
#
# Deploy both notebooks as serverless Databricks jobs:
#
#   cd demos/a2d2
#   databricks bundle deploy  -t dev -p <your-profile>
#   databricks bundle run a2d2_ingestion        -t dev -p <your-profile>  # 1) download + ingest
#   databricks bundle run a2d2_object_detection -t dev -p <your-profile>  # 2) detect -> channels
#   databricks bundle run a2d2_analysis         -t dev -p <your-profile>  # 3) events + MP4 clips
#
# The impulse package is built from the repo root (../..) into ./dist as a wheel and
# installed on the serverless jobs, so `import impulse_*` works without the repo being on
# the workspace sys.path. Override any widget via a bundle variable, e.g.:
#
#   databricks bundle run a2d2_ingestion -t dev -p <profile> \
#       --var="catalog=my_catalog,schema=my_schema,download_images=false"
bundle:
  name: a2d2-demo

variables:
  catalog:
    description: Unity Catalog catalog for the silver tables and download volume.
    default: main
  schema:
    description: Target schema (created if missing).
    default: a2d2_demo
  table_prefix:
    default: a2d2
  volume:
    default: a2d2_raw
  download_images:
    default: "true"
  images_per_second:
    description: Images to extract per second across the bus time window.
    default: "0.1"
  index_scan_limit:
    default: "20000"
  clip_max_duration_s:
    description: Max seconds of footage per event MP4 clip (analysis notebook).
    default: "5"
  clip_fps:
    description: Playback frames-per-second for event MP4 clips (analysis notebook).
    default: "5"
  clips_per_event:
    description: How many MP4 clips to export per event name (analysis notebook).
    default: "5"
  detect_model:
    description: torchvision detector (fasterrcnn_resnet50_fpn | ssdlite320_mobilenet_v3_large | fcos_resnet50_fpn).
    default: fasterrcnn_resnet50_fpn
  detect_score_threshold:
    description: Minimum detection score to count a box.
    default: "0.5"
  detect_repartitions:
    description: Spark partitions for distributed inference (controls parallelism).
    default: "16"

artifacts:
  impulse_wheel:
    type: whl
    path: .
    build: uv build --wheel ../.. --out-dir ./dist

resources:
  jobs:
    a2d2_ingestion:
      name: "[A2D2] bus + camera ingestion"
      tasks:
        - task_key: ingest
          notebook_task:
            notebook_path: ./a2d2_ingestion.ipynb
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              table_prefix: ${var.table_prefix}
              volume: ${var.volume}
              download_images: ${var.download_images}
              images_per_second: ${var.images_per_second}
              index_scan_limit: ${var.index_scan_limit}
              skip_download_if_present: "true"
              drop_created_tables: "false"
          environment_key: default
      environments:
        - environment_key: default
          spec:
            # Serverless environment version 5 (impulse requires serverless v4+; Python 3.12).
            environment_version: "5"
            dependencies:
              - ./dist/databricks_impulse-*.whl

    a2d2_analysis:
      name: "[A2D2] bus + camera analysis (events + MP4 clips)"
      tasks:
        - task_key: analyze
          notebook_task:
            notebook_path: ./a2d2_analysis.ipynb
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              table_prefix: ${var.table_prefix}
              volume: ${var.volume}
              clip_max_duration_s: ${var.clip_max_duration_s}
              clip_fps: ${var.clip_fps}
              clips_per_event: ${var.clips_per_event}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            environment_version: "5"
            dependencies:
              - ./dist/databricks_impulse-*.whl

    # Object detection -> silver channels. Standalone job for now; once proven it can be
    # folded into a2d2_ingestion as a `detect` task with `depends_on: [{task_key: ingest}]`.
    a2d2_object_detection:
      name: "[A2D2] object detection -> channels"
      tasks:
        - task_key: detect
          notebook_task:
            notebook_path: ./a2d2_object_detection.ipynb
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              table_prefix: ${var.table_prefix}
              volume: ${var.volume}
              detect_model: ${var.detect_model}
              detect_score_threshold: ${var.detect_score_threshold}
              detect_repartitions: ${var.detect_repartitions}
          environment_key: detect
      environments:
        - environment_key: detect
          spec:
            environment_version: "5"
            dependencies:
              - ./dist/databricks_impulse-*.whl
              - torch
              - torchvision

targets:
  dev:
    mode: development
    default: true
